<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>金沢観光</title>

    <link rel="stylesheet" href="header.css" type="text/css" />
    <link rel="stylesheet" href="style.css" type="text/css" />

    <script src="index.js"></script>
  </head>

  <body>
    <!-- ヘッダー -->
    <header class="header">
      <div class="wrap">
        <h1>&#x1f4f7;About KANAZAWA</h1>
      </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="fade-in-up">
      <!-- 画像スクロール -->
      <div class="scroll-infinity">
        <div class="scroll-infinity__wrap">
          <ul class="scroll-infinity__list scroll-infinity__list--left">
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/higashityayamachi01.JPG" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/higashityayamachi02.JPG" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/higashityayamachi03.JPG" alt="ひがし茶屋街3" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/higashityayamachi04.JPG" alt="ひがし茶屋街4" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/inu.JPG" alt="金沢城1" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/kanazawajyou01.JPG" />
              </li>
            </a>
          </ul>
          <ul class="scroll-infinity__list scroll-infinity__list--left">
            <a href="#"
              ><li class="scroll-infinity__item">
                <img src="image/kanazawajyou02.JPG" alt="金沢城2" /></li
            ></a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/kenritsutosyokan.JPG" alt="石川県立図書館" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/kenrokuen01.JPG" alt="兼六園1" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/kenrokuen02.JPG" alt="兼六園2" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/oumityouichiba01.JPG" alt="近江町市場1" />
              </li>
            </a>
            <a href="#">
              <li class="scroll-infinity__item">
                <img src="image/oumityouichiba02.JPG" alt="近江町市場2" />
              </li>
            </a>
          </ul>
        </div>
      </div>

      <!-- 見出し -->
      <div class="box-h">
        <h3>歴史</h3>
      </div>

      <!-- 歴史のカード -->
      <div class="card-grid">
        <article class="card">
          <img
            src="image/kanazawajyou01.JPG"
            alt="金沢城"
            class="card__image"
          />
          <div class="card__content">
            <h2 class="card__title">金沢城</h2>
            <p class="card__text"></p>
          </div>
        </article>

        <article class="card">
          <img src="image/kenrokuen01.JPG" alt="兼六園" class="card__image" />
          <div class="card__content">
            <h2 class="card__title">兼六園</h2>
            <p class="card__text"></p>
          </div>
        </article>

        <article class="card">
          <img
            src="image/oumityouichiba01.JPG"
            alt="近江町市場"
            class="card__image"
          />
          <div class="card__content">
            <h2 class="card__title">近江町市場</h2>
            <p class="card__text"></p>
          </div>
        </article>

        <article class="card">
          <img
            src="image/higashityayamachi01.JPG"
            alt="ひがし茶屋街"
            class="card__image"
          />
          <div class="card__content">
            <h2 class="card__title">ひがし茶屋街</h2>
            <p class="card__text"></p>
          </div>
        </article>
      </div>

      <div class="box-h">
        <h3>食べ物</h3>
      </div>

      <div>
        <div class="card-grid">
          <article class="card">
            <img src="image/shiratama.jpg" alt="白玉" class="card__image" />
            <div class="card__content">
              <h2 class="card__title">白玉</h2>
              <p class="card__text"></p>
            </div>
          </article>

          <article class="card">
            <img
              src="image/hyakumanyaki.jpg"
              alt="ひゃくまん焼き"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">ひゃくまん焼き</h2>
              <p class="card__text"></p>
            </div>
          </article>

          <article class="card">
            <img
              src="image/tiramisu.jpg"
              alt="抹茶・ほうじ茶ティラミス"
              class="card__image"
            />
            <div class="card__content">
              <h2 class="card__title">抹茶・ほうじ茶ティラミス</h2>
              <p class="card__text"></p>
            </div>
          </article>
        </div>

        <div class="box-h">
          <h3>植物</h3>
        </div>
      </div>
    </main>
  </body>
</html>
