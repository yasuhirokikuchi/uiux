<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>金沢観光 - 建築物</title>
    <link rel="icon" type="image/svg+xml" href="image/logo.svg" />

    <link rel="stylesheet" href="style.css" type="text/css" />
    <link rel="stylesheet" href="header.css" type="text/css" />
    <link rel="stylesheet" href="footer.css" type="text/css" />

    <script src="index.js"></script>
  </head>

  <body>
    <!-- ヘッダー -->
    <header class="header">
      <div class="wrap">
        <a href="index.html">
          <h1>
            <img src="image/logo.svg" alt="Logo" class="logo" />Kanazawa
            Bookmark
          </h1>
        </a>
        <nav class="menu">
          <a href="building.html">建築物</a>
          <a href="food.html">食べ物</a>
          <a href="history.html">歴史</a>

    <main class="fade-in-up">
      <!-- 見出し -->
      <section id="architecture">
        <h2>建築物</h2>
      </section>

      <!-- 観光地カード -->
      <section>
        <div class="card-grid">
          <article class="card">
            <div class="card__image-wrapper">
              <img
                src="image/kanazawajyou01.JPG"
                alt="金沢城"
                class="card__image"
              />
              <div class="card__content">
                <h3 class="card__title">金沢城</h3>
              </div>
            </div>
            <iframe
              class="card__map"
              src="https://maps.google.com/maps?q=金沢城&output=embed"
              allowfullscreen=""
              loading="lazy"
            ></iframe>
            <a href="https://www.google.com/maps/search/?api=1&query=金沢城" target="_blank" class="card__map-link">Googleマップで見る</a>
          </article>

          <article class="card">
            <div class="card__image-wrapper">
              <img
                src="image/kenrokuen01.JPG"
                alt="兼六園"
                class="card__image"
              />
              <div class="card__content">
                <h3 class="card__title">兼六園</h3>
              </div>
            </div>
            <iframe
              class="card__map"
              src="https://maps.google.com/maps?q=兼六園&output=embed"
              allowfullscreen=""
              loading="lazy"
            ></iframe>
            <a href="https://www.google.com/maps/search/?api=1&query=兼六園" target="_blank" class="card__map-link">Googleマップで見る</a>

          <article class="card">
            <div class="card__image-wrapper">

                src="image/oumityouichiba01.JPG"

                class="card__image"
              />
              <div class="card__content">
                <h3 class="card__title">近江町市場</h3>
              </div>
            </div>
            <iframe
              class="card__map"
              src="https://maps.google.com/maps?q=近江町市場&output=embed"
              allowfullscreen=""
              loading="lazy"
            ></iframe>
            <a href="https://www.google.com/maps/search/?api=1&query=近江町市場" target="_blank" class="card__map-link">Googleマップで見る</a>
          </article>

          <article class="card">
            <div class="card__image-wrapper">
              <img
                src="image/higashityayamachi01.JPG"
                alt="ひがし茶屋街"
                class="card__image"
              />
              <div class="card__content">
                <h3 class="card__title">ひがし茶屋街</h3>
              </div>
            </div>
            <iframe
              class="card__map"
              src="https://maps.google.com/maps?q=ひがし茶屋街&output=embed"
              allowfullscreen=""
              loading="lazy"

          </article>

          <article class="card">
            <div class="card__image-wrapper">
              <img

              />
              <div class="card__content">
                <h3 class="card__title">石川県立図書館</h3>
