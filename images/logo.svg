<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#003a4e" />
  
  <!-- Plum Blossom Motif (Inspired by Kaga-Maeda Crest) -->
  <g fill="#bfa177">
    <circle cx="50" cy="28" r="12" />
    <circle cx="71" cy="43" r="12" />
    <circle cx="63" cy="68" r="12" />
    <circle cx="37" cy="68" r="12" />
    <circle cx="29" cy="43" r="12" />
    
    <!-- Center Circle (Lens Housing) -->
    <circle cx="50" cy="50" r="15" />
  </g>
  
  <!-- Camera Lens Detail -->
  <circle cx="50" cy="50" r="9" fill="#003a4e" />
  <circle cx="53" cy="47" r="3" fill="#ffffff" opacity="0.4" />
  
  <!-- Gold Leaf Flecks (Subtle) -->
  <circle cx="20" cy="20" r="1.5" fill="#bfa177" opacity="0.6" />
  <circle cx="85" cy="15" r="2" fill="#bfa177" opacity="0.4" />
  <circle cx="15" cy="80" r="2.5" fill="#bfa177" opacity="0.5" />
  <circle cx="80" cy="85" r="1.5" fill="#bfa177" opacity="0.3" />
</svg>
